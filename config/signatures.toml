# File carving signature database
# Each [[signature]] entry defines a file type to search for during carving.
#
# Fields:
#   name       = human-readable label
#   extension  = output file extension
#   header     = hex bytes of the file header (magic bytes), space-separated
#                Use ?? for wildcard bytes.
#   footer     = hex bytes of the file footer (optional, "" if none)
#   min_size   = minimum file size in bytes (hits smaller than this are skipped)
#   max_size   = maximum file size in bytes (caps extraction window)

[[signature]]
name         = "JPEG Image (JFIF)"
extension    = "jpg"
# 4-byte header: FF D8 FF E0 — standard JFIF JPEGs written by cameras/software.
header       = "FF D8 FF E0"
footer       = "FF D9"
max_size     = 10_485_760  # 10 MiB
# Validates "JFIF\0" identifier at offset 6 to reject FF D8 FF E0 hits
# that appear inside other binary formats.
pre_validate = "jpeg_jfif"

[[signature]]
name         = "JPEG Image (Exif)"
extension    = "jpg"
# 4-byte header: FF D8 FF E1 — camera photos with EXIF/APP1 metadata block.
header       = "FF D8 FF E1"
footer       = "FF D9"
max_size     = 10_485_760  # 10 MiB
# Validates "Exif" identifier at offset 6.
pre_validate = "jpeg_exif"

[[signature]]
name         = "PNG Image"
extension    = "png"
header       = "89 50 4E 47 0D 0A 1A 0A"
footer       = "49 45 4E 44 AE 42 60 82"
max_size     = 52_428_800  # 50 MiB
# Validates that the first chunk is IHDR with length == 13 (required by spec).
pre_validate = "png"

[[signature]]
name         = "PDF Document"
extension    = "pdf"
header       = "25 50 44 46"
footer       = "25 25 45 4F 46"
# footer_last = true: PDF binary streams can contain %%EOF internally, and
# incrementally-updated PDFs accumulate multiple %%EOF markers.  Using the
# last occurrence gives the complete, valid file.
footer_last  = true
max_size     = 104_857_600  # 100 MiB
# Validates PDF version string "-1.x" or "-2.x" at offset 4.
pre_validate = "pdf"

[[signature]]
name         = "ZIP / Office (DOCX/XLSX/PPTX)"
extension    = "zip"
header       = "50 4B 03 04"
footer       = "50 4B 05 06"
# Validates version, compression method, filename plausibility, and rejects
# directory entries — eliminates false hits on internal ZIP headers.
pre_validate = "zip"
min_size     = 512
max_size     = 104_857_600  # 100 MiB

[[signature]]
name         = "GIF Image"
extension    = "gif"
header       = "47 49 46 38"
footer       = "00 3B"
max_size     = 10_485_760  # 10 MiB
# Validates bytes 4-5 are "7a" or "9a" (GIF87a / GIF89a).
pre_validate = "gif"

[[signature]]
name             = "BMP Image"
extension        = "bmp"
# 10-byte header: "BM" + 4-byte file size (wildcarded) + reserved 00 00 00 00.
header           = "42 4D ?? ?? ?? ?? 00 00 00 00"
footer           = ""
max_size         = 52_428_800  # 50 MiB hard cap
size_hint_offset = 2
size_hint_len    = 4
size_hint_endian = "le"
size_hint_add    = 0
# Validates DIB header size (u32 LE @14) is a known value {12,40,52,56,108,124}.
pre_validate     = "bmp"

[[signature]]
name         = "MP3 Audio"
extension    = "mp3"
# ID3v2 tag: "ID3" + wildcarded version + 0x00 revision byte.
header       = "49 44 33 ?? 00"
footer       = ""
min_size     = 4096
max_size     = 52_428_800  # 50 MiB hard cap
# Validates version in {2,3,4}, flags low nibble zero, syncsafe size bytes.
pre_validate = "mp3"

[[signature]]
name            = "MP4 Video"
extension       = "mp4"
# Wildcards the 4-byte ftyp box size; anchors on "ftyp".
header          = "?? ?? ?? ?? 66 74 79 70"
footer          = ""
min_size        = 4096
max_size        = 4_294_967_296  # 4 GiB fallback when box-walk fails
size_hint_kind  = "mp4"
# Validates ftyp box size in [12, 512] and brand bytes are printable ASCII.
# Rejects "qt  " (→ .mov), "M4V " (→ .m4v), and "3gp*"/"3g2*" (→ .3gp)
# brands which have their own dedicated signatures.
pre_validate    = "mp4"

[[signature]]
name         = "RAR Archive"
extension    = "rar"
header       = "52 61 72 21 1A 07"
footer       = ""
max_size     = 524_288_000  # 500 MiB
# Validates type byte (offset 6) is 0x00 (RAR4) or 0x01 (RAR5).
pre_validate = "rar"

[[signature]]
name           = "7-Zip Archive"
extension      = "7z"
header         = "37 7A BC AF 27 1C"
footer         = ""
max_size       = 524_288_000  # 500 MiB hard cap
size_hint_kind = "seven_zip"
# Validates major version byte (offset 6) is 0x00.
pre_validate   = "seven_zip"

[[signature]]
name           = "SQLite Database"
extension      = "db"
header         = "53 51 4C 69 74 65 20 66 6F 72 6D 61 74 20 33 00"
footer         = ""
max_size       = 10_737_418_240  # 10 GiB hard cap
size_hint_kind = "sqlite"
# Validates page size (u16 BE @16) is a power-of-2 in [512, 65536].
pre_validate   = "sqlite"

[[signature]]
name             = "WAV Audio (RIFF)"
extension        = "wav"
# RIFF + 4-byte size (wildcard) + "WAVE" subtype discriminator (12 bytes total)
header           = "52 49 46 46 ?? ?? ?? ?? 57 41 56 45"
footer           = ""
max_size         = 2_147_483_648  # 2 GiB hard cap
size_hint_offset = 4
size_hint_len    = 4
size_hint_endian = "le"
size_hint_add    = 8
# No pre_validate — the 12-byte RIFF+WAVE header is already highly discriminating.

[[signature]]
name             = "AVI Video (RIFF)"
extension        = "avi"
# RIFF + 4-byte size (wildcard) + "AVI " subtype discriminator (12 bytes total)
header           = "52 49 46 46 ?? ?? ?? ?? 41 56 49 20"
footer           = ""
max_size         = 2_147_483_648  # 2 GiB hard cap
size_hint_offset = 4
size_hint_len    = 4
size_hint_endian = "le"
size_hint_add    = 8
# No pre_validate — the 12-byte RIFF+AVI  header is already highly discriminating.

[[signature]]
name         = "Matroska / MKV Video"
extension    = "mkv"
header       = "1A 45 DF A3"
footer       = ""
max_size     = 8_589_934_592  # 8 GiB
# Validates EBML VINT leading byte (offset 4) is non-zero.
pre_validate = "mkv"

[[signature]]
name         = "FLAC Audio"
extension    = "flac"
header       = "66 4C 61 43"
footer       = ""
max_size     = 2_147_483_648  # 2 GiB
# Validates first metadata block type (lower 7 bits @4) == 0 (STREAMINFO).
pre_validate = "flac"

[[signature]]
name         = "Windows PE Executable"
extension    = "exe"
# Extended MZ header: 4D 5A 90 00 (standard MSVC DOS stub).
header       = "4D 5A 90 00"
footer       = ""
min_size     = 4096
max_size     = 104_857_600  # 100 MiB
# Validates e_lfanew (u32 LE @60) is in [64, 16384].
pre_validate = "exe"

[[signature]]
name         = "VMDK Disk Image"
extension    = "vmdk"
header       = "4B 44 4D 56"
footer       = ""
min_size     = 65536
max_size     = 10_737_418_240  # 10 GiB
# Validates version field (u32 LE @4) is in {1, 2, 3}.
pre_validate = "vmdk"

[[signature]]
name           = "OGG Media"
extension      = "ogg"
header         = "4F 67 67 53"
footer         = ""
max_size       = 2_147_483_648  # 2 GiB hard cap
size_hint_kind = "ogg_stream"
# Validates stream-structure version == 0 and BOS flag (bit 1) set — ensures
# we match only the first page of a logical bitstream, not continuation pages.
pre_validate   = "ogg"

[[signature]]
name              = "Windows Event Log"
extension         = "evtx"
header            = "45 4C 46 49 4C 45 00"
footer            = ""
max_size          = 104_857_600   # 100 MiB hard cap
size_hint_kind    = "linear_scaled"
size_hint_offset  = 42
size_hint_len     = 2
size_hint_endian  = "le"
size_hint_scale   = 65536
size_hint_add     = 4096
# Validates MajorVersion (u16 LE @38) == 3 (Windows Vista+).
pre_validate      = "evtx"

[[signature]]
name         = "Outlook PST/OST"
extension    = "pst"
header       = "21 42 44 4E"
footer       = ""
min_size     = 65536
max_size     = 21_474_836_480  # 20 GiB
# Validates wMagicClient bytes @8-9 == [0x4D, 0x53] ("SM").
pre_validate = "pst"

[[signature]]
name         = "XML Document"
extension    = "xml"
header       = "3C 3F 78 6D 6C"
footer       = ""
min_size     = 256
max_size     = 5_242_880   # 5 MiB
# Validates that a space follows "<?xml" (byte 5 == 0x20).
pre_validate = "xml"

[[signature]]
name         = "HTML Document"
extension    = "html"
header       = "3C 21 44 4F 43 54 59 50 45"
footer       = "3C 2F 68 74 6D 6C 3E"
max_size     = 10_485_760  # 10 MiB
# Validates "<!DOCTYPE" is followed by " html" or " HTML".
pre_validate = "html"

[[signature]]
name         = "RTF Document"
extension    = "rtf"
header       = "7B 5C 72 74 66 31"
footer       = ""
max_size     = 52_428_800  # 50 MiB
# Validates byte 6 is '\', space, CR, or LF.
pre_validate = "rtf"

[[signature]]
name         = "vCard Contact"
extension    = "vcf"
header       = "42 45 47 49 4E 3A 56 43 41 52 44"
footer       = "45 4E 44 3A 56 43 41 52 44"
max_size     = 1_048_576  # 1 MiB
# Validates CR or LF immediately follows "BEGIN:VCARD".
pre_validate = "vcard"

[[signature]]
name         = "iCalendar"
extension    = "ics"
header       = "42 45 47 49 4E 3A 56 43 41 4C 45 4E 44 41 52"
footer       = "45 4E 44 3A 56 43 41 4C 45 4E 44 41 52"
max_size     = 10_485_760  # 10 MiB
# Validates CR or LF immediately follows "BEGIN:VCALENDAR".
pre_validate = "ical"

[[signature]]
name           = "OLE2 Compound (DOC/XLS/PPT)"
extension      = "ole"
header         = "D0 CF 11 E0 A1 B1 1A E1"
footer         = ""
max_size       = 2_147_483_648  # 2 GiB hard cap
size_hint_kind = "ole2"
# Validates ByteOrder field (u16 LE @28) == 0xFFFE (mandatory in all OLE2 files).
pre_validate   = "ole2"

[[signature]]
name           = "Sony ARW Raw Photo"
extension      = "arw"
# TIFF LE magic + IFD offset fixed at 8 (universal for Sony ARW).
# The 8-byte anchor filters generic TIFF files; the pre-validator confirms
# a plausible IFD entry count and the "SONY" Make string in the header area.
header         = "49 49 2A 00 08 00 00 00"
footer         = ""
min_size       = 1_000_000    # 1 MB — RAW files are never tiny
max_size       = 200_000_000  # 200 MB — covers A7R V, A1, and future sensors
# TIFF IFD walker derives true size from SubIFD strip extents.
size_hint_kind = "tiff"
# Validates IFD entry count in [5,50] and "SONY" string within first 512 bytes.
pre_validate   = "arw"

[[signature]]
name           = "Canon CR2 Raw Photo"
extension      = "cr2"
# TIFF LE magic + wildcard IFD offset + Canon marker CR\x02\x00 at offset 8.
# The 12-byte pattern (4 exact + 4 wildcard + 4 exact) is highly distinctive.
header         = "49 49 2A 00 ?? ?? ?? ?? 43 52 02 00"
footer         = ""
min_size       = 1_000_000    # 1 MB
max_size       = 120_000_000  # 120 MB — covers 5DS R (50 MP) and newer
# TIFF IFD walker derives true size from SubIFD strip extents.
size_hint_kind = "tiff"
# Validates IFD offset at +4 is in [8, 4096].
pre_validate   = "cr2"

[[signature]]
name           = "Panasonic RW2 Raw Photo"
extension      = "rw2"
# Panasonic TIFF variant: II + 0x55 0x00 (0x0055 instead of standard 0x002A).
# This single byte difference from standard TIFF is already highly selective.
header         = "49 49 55 00"
footer         = ""
min_size       = 1_000_000    # 1 MB
max_size       = 150_000_000  # 150 MB — covers S1R (47 MP)
# TIFF IFD walker derives true size; handles RW2's non-standard 0x55 magic.
size_hint_kind = "tiff"
# Validates IFD offset in [8,4096] and entry count in [3,50].
pre_validate   = "rw2"

[[signature]]
name           = "Fujifilm RAF Raw Photo"
extension      = "raf"
# "FUJIFILMCCD-RAW" — 15 unique ASCII bytes, one of the most distinctive
# RAW signatures.  False-positive probability is essentially zero.
header         = "46 55 4A 49 46 49 4C 4D 43 43 44 2D 52 41 57"
footer         = ""
min_size       = 1_000_000    # 1 MB
max_size       = 300_000_000  # 300 MB — covers GFX 100 / GFX 100S (102 MP)
# RAF header stores JPEG and CFA extents at fixed offsets 84–99 (BE u32 pairs).
size_hint_kind = "raf"
# Validates space at offset 15 and 4-digit ASCII version string at offset 16.
pre_validate   = "raf"

[[signature]]
name           = "TIFF Image (Little-Endian)"
extension      = "tif"
# Standard TIFF LE magic: "II" byte order + 0x2A TIFF marker.
# Covers plain TIFF, Adobe DNG (Digital Negative), and any other TIFF-based
# format not covered by the dedicated ARW / CR2 / RW2 / NEF signatures.
header         = "49 49 2A 00"
footer         = ""
max_size       = 1_073_741_824  # 1 GiB — large scans and multi-layer PSD-style TIFFs
# TIFF IFD walker derives true size from strip/tile offset+length pairs.
size_hint_kind = "tiff"
# Rejects Sony ARW ("SONY" marker), Canon CR2 (CR\x02\x00 at +8), and
# Nikon NEF ("NIKON" marker) — each has a dedicated signature with the
# correct extension.
pre_validate   = "tiff_le"

[[signature]]
name           = "TIFF Image (Big-Endian)"
extension      = "tif"
# Big-endian TIFF: "MM" byte order + 0x2A marker.  Less common than LE but
# produced by some scanners, older Mac software, and certain cameras.
header         = "4D 4D 00 2A"
footer         = ""
max_size       = 1_073_741_824  # 1 GiB
# TIFF IFD walker derives true size.
size_hint_kind = "tiff"
# Validates IFD offset and entry count are plausible.
pre_validate   = "tiff_be"

[[signature]]
name           = "Nikon NEF Raw Photo"
extension      = "nef"
# TIFF LE magic — same as standard TIFF.  The pre-validator distinguishes
# Nikon NEF files by requiring the "NIKON" manufacturer string within the
# first 512 bytes of the header.
header         = "49 49 2A 00"
footer         = ""
min_size       = 1_000_000    # 1 MB — RAW files are never tiny
max_size       = 200_000_000  # 200 MB — covers Z9 (45 MP) and future sensors
# TIFF IFD walker derives true size from SubIFD strip extents.
size_hint_kind = "tiff"
# Validates IFD offset in [8,4096] and "NIKON" string in first 512 bytes.
pre_validate   = "nef"

[[signature]]
name           = "Apple HEIC Photo (heic)"
extension      = "heic"
# ISOBMFF ftyp box with "heic" major brand — standard iPhone HEIC photo.
# First 4 bytes are the variable box size (wildcarded); bytes 4-7 are "ftyp";
# bytes 8-11 are the "heic" brand.
header         = "?? ?? ?? ?? 66 74 79 70 68 65 69 63"
footer         = ""
min_size       = 16384         # 16 KiB
max_size       = 100_000_000   # 100 MB — HEIC is highly compressed
# ISOBMFF box walker derives true file size.
size_hint_kind = "mp4"
# Validates ftyp box size in [12, 512].
pre_validate   = "heic"

[[signature]]
name           = "Apple HEIC Photo (heix)"
extension      = "heic"
# ISOBMFF ftyp box with "heix" major brand — HEIC with extended feature set,
# used by newer iPhone models and iOS versions.
header         = "?? ?? ?? ?? 66 74 79 70 68 65 69 78"
footer         = ""
min_size       = 16384
max_size       = 100_000_000
size_hint_kind = "mp4"
pre_validate   = "heic"

[[signature]]
name           = "QuickTime MOV Video"
extension      = "mov"
# ISOBMFF ftyp box with "qt  " (QuickTime) major brand — used by macOS/iPhone
# recorded videos and Final Cut Pro exports.
# First 4 bytes are the variable box size (wildcarded); bytes 4-7 are "ftyp";
# bytes 8-11 are the "qt  " brand (two trailing spaces).
header         = "?? ?? ?? ?? 66 74 79 70 71 74 20 20"
footer         = ""
min_size       = 4096
max_size       = 4_294_967_296   # 4 GiB
size_hint_kind = "mp4"
# Validates ftyp box size in [12, 512].
pre_validate   = "mov"

[[signature]]
name           = "iTunes M4V Video"
extension      = "m4v"
# ISOBMFF ftyp box with "M4V " major brand — iTunes purchased / rented video.
header         = "?? ?? ?? ?? 66 74 79 70 4D 34 56 20"
footer         = ""
min_size       = 4096
max_size       = 4_294_967_296   # 4 GiB
size_hint_kind = "mp4"
# Validates ftyp box size in [12, 512].
pre_validate   = "m4v"

[[signature]]
name           = "3GPP / 3GPP2 Mobile Video"
extension      = "3gp"
# ISOBMFF ftyp box whose major brand starts with "3g" (e.g. 3gp5, 3gp6, 3g2a).
# 10-byte header anchors on ftyp + first two brand bytes "3g"; pre-validator
# confirms the full brand is "3gp*" or "3g2*".
header         = "?? ?? ?? ?? 66 74 79 70 33 67"
footer         = ""
min_size       = 4096
max_size       = 536_870_912     # 512 MiB — mobile clips are small
size_hint_kind = "mp4"
# Validates full brand starts with "3gp" or "3g2"; box size in [12, 512].
pre_validate   = "3gp"

[[signature]]
name         = "WebM Video"
extension    = "webm"
# EBML container with DocType "webm" — VP8/VP9/AV1 video, Vorbis/Opus audio.
# Shares the same 4-byte EBML magic as MKV; the pre-validator checks the
# DocType element to distinguish WebM from Matroska.
header       = "1A 45 DF A3"
footer       = ""
max_size     = 8_589_934_592  # 8 GiB
# Validates EBML VINT leading byte non-zero and DocType element == "webm".
pre_validate = "webm"

[[signature]]
name         = "Windows Media Video / ASF"
extension    = "wmv"
# ASF (Advanced Systems Format) Header Object — used by WMV, WMA, and ASF
# files.  The 16-byte GUID is globally unique; no other format shares it.
header       = "30 26 B2 75 8E 66 CF 11 A6 D9 00 AA 00 62 CE 6C"
footer       = ""
min_size     = 4096
max_size     = 4_294_967_296  # 4 GiB
# Validates ASF object size (u64 LE @16) is ≥ 30 bytes.
pre_validate = "wmv"

[[signature]]
name         = "Flash Video (FLV)"
extension    = "flv"
# FLV file header: "FLV" magic + version byte 0x01.
# Reserved flag bits must be zero; DataOffset must be 9.
header       = "46 4C 56 01"
footer       = ""
min_size     = 4096
max_size     = 4_294_967_296  # 4 GiB
# Validates reserved type-flag bits are zero and DataOffset (u32 BE @5) == 9.
pre_validate = "flv"

[[signature]]
name         = "MPEG-2 / MPEG-1 Program Stream"
extension    = "mpg"
# MPEG Program Stream pack header: 00 00 01 BA.
# Byte @+4: top-2-bits == 01 → MPEG-2; top-4-bits == 0010 → MPEG-1.
header       = "00 00 01 BA"
footer       = ""
min_size     = 4096
max_size     = 4_294_967_296  # 4 GiB
# Validates MPEG-2 (0x40–0x7F) or MPEG-1 (0x20–0x2F) pack-byte pattern.
pre_validate = "mpeg"

[[signature]]
name         = "WebP Image"
extension    = "webp"
# RIFF container with "WEBP" subtype at bytes 8-11.
# Shares the RIFF 4-byte size field pattern with WAV and AVI.
header       = "52 49 46 46 ?? ?? ?? ?? 57 45 42 50"
footer       = ""
max_size     = 52_428_800  # 50 MiB
size_hint_offset = 4
size_hint_len    = 4
size_hint_endian = "le"
size_hint_add    = 8
pre_validate = "webp"

[[signature]]
name           = "AAC / M4A Audio"
extension      = "m4a"
# ISOBMFF ftyp box with "M4A " major brand.
# Same box walker as MP4; rejects video brands.
header         = "?? ?? ?? ?? 66 74 79 70 4D 34 41 20"
footer         = ""
min_size       = 4096
max_size       = 524_288_000  # 500 MiB
size_hint_kind = "mp4"
pre_validate   = "m4a"

[[signature]]
name         = "GZip Compressed"
extension    = "gz"
# ID1=0x1F ID2=0x8B — universally identifies gzip.  Byte @2 must be
# compression method 8 (DEFLATE); byte @3 is flags (bit 5 reserved=0).
header       = "1F 8B"
footer       = ""
min_size     = 20
max_size     = 2_147_483_648  # 2 GiB hard cap
pre_validate = "gz"

[[signature]]
name         = "Email Message (EML)"
extension    = "eml"
# RFC 2822 mbox/standalone email — starts with "From " followed by sender
# address or "MIME-Version:" header.  Text-based; size capped conservatively.
header       = "46 72 6F 6D 20"
footer       = ""
min_size     = 64
max_size     = 52_428_800  # 50 MiB
pre_validate = "eml"

[[signature]]
name         = "ELF Executable / Shared Library"
extension    = "elf"
# ELF magic: 0x7F "ELF" — Linux/Unix executables and shared objects.
header       = "7F 45 4C 46"
footer       = ""
min_size     = 64
max_size     = 104_857_600  # 100 MiB
pre_validate = "elf"

[[signature]]
name           = "Windows Registry Hive (REGF)"
extension      = "dat"
# "regf" magic — NTUSER.DAT, SAM, SYSTEM, SOFTWARE registry files.
# Size is stored at offset 40 as a u32 LE (hive length in bytes).
header         = "72 65 67 66"
footer         = ""
min_size       = 4096
max_size       = 524_288_000  # 500 MiB
size_hint_offset = 40
size_hint_len    = 4
size_hint_endian = "le"
size_hint_add    = 0
pre_validate   = "regf"

[[signature]]
name         = "Adobe Photoshop Document (PSD/PSB)"
extension    = "psd"
# "8BPS" magic — PSD (version 1, max 30000px) or PSB (version 2, max 300000px).
header       = "38 42 50 53"
footer       = ""
min_size     = 512
max_size     = 2_147_483_648  # 2 GiB (large multi-layer PSBs can be huge)
pre_validate = "psd"

[[signature]]
name         = "VHD Virtual Hard Disk"
extension    = "vhd"
# "conectix" creator ID in the VHD footer — present at byte 0 in fixed
# images and at the last 512 bytes in dynamic/differencing images.
# Ferrite scans from byte 0 so this catches fixed VHDs; dynamic VHDs
# are identified by the footer copy at offset 512.
header       = "63 6F 6E 65 63 74 69 78"
footer       = ""
min_size     = 512
max_size     = 68_719_476_736  # 64 GiB hard cap
pre_validate = "vhd"

[[signature]]
name         = "VHDX Virtual Hard Disk"
extension    = "vhdx"
# "vhdxfile" file identifier signature — Microsoft Hyper-V VHDX format.
# Replaces VHD on Windows Server 2012+; supports up to 64 TiB.
header       = "76 68 64 78 66 69 6C 65"
footer       = ""
min_size     = 1_048_576  # 1 MiB minimum for a valid VHDX
max_size     = 68_719_476_736  # 64 GiB hard cap
pre_validate = "vhdx"

[[signature]]
name         = "QCOW2 Virtual Disk (QEMU)"
extension    = "qcow2"
# QCOW2 magic: 0x514649FB ("QFI\xFB") — QEMU Copy-On-Write version 2/3.
# Version u32 BE @4 must be 2 or 3; cluster_bits u32 BE @20 in [9,21].
header       = "51 46 49 FB"
footer       = ""
min_size     = 65536
max_size     = 68_719_476_736  # 64 GiB hard cap
pre_validate = "qcow2"
