# File carving signature database
# Each [[signature]] entry defines a file type to search for during carving.
#
# Fields:
#   name       = human-readable label
#   extension  = output file extension
#   header     = hex bytes of the file header (magic bytes), space-separated
#                Use ?? for wildcard bytes.
#   footer     = hex bytes of the file footer (optional, "" if none)
#   min_size   = minimum file size in bytes (hits smaller than this are skipped)
#   max_size   = maximum file size in bytes (caps extraction window)

[[signature]]
name      = "JPEG Image (JFIF)"
extension = "jpg"
# 4-byte header: FF D8 FF E0 — standard JFIF JPEGs written by cameras/software.
# Using 4 bytes avoids matching embedded EXIF thumbnails which typically start
# with FF D8 FF DB (quantization table) rather than FF D8 FF E0.
header    = "FF D8 FF E0"
footer    = "FF D9"
max_size  = 10_485_760  # 10 MiB

[[signature]]
name      = "JPEG Image (Exif)"
extension = "jpg"
# 4-byte header: FF D8 FF E1 — camera photos with EXIF/APP1 metadata block.
header    = "FF D8 FF E1"
footer    = "FF D9"
max_size  = 10_485_760  # 10 MiB

[[signature]]
name      = "PNG Image"
extension = "png"
header    = "89 50 4E 47 0D 0A 1A 0A"
footer    = "49 45 4E 44 AE 42 60 82"
max_size  = 52_428_800  # 50 MiB

[[signature]]
name        = "PDF Document"
extension   = "pdf"
header      = "25 50 44 46"
footer      = "25 25 45 4F 46"
# footer_last = true: PDF binary streams can contain %%EOF internally, and
# incrementally-updated PDFs accumulate multiple %%EOF markers.  Using the
# last occurrence gives the complete, valid file.
footer_last = true
max_size    = 104_857_600  # 100 MiB

[[signature]]
name      = "ZIP / Office (DOCX/XLSX/PPTX)"
extension = "zip"
header    = "50 4B 03 04"
footer    = "50 4B 05 06"
# Note: every local-file-header inside an existing ZIP also matches PK\x03\x04,
# so a multi-file archive generates multiple hits.  The footer (End of Central
# Directory record) terminates extraction cleanly when the archive is intact.
# min_size rejects the stub local headers that appear mid-archive.
min_size  = 512
max_size  = 104_857_600  # 100 MiB (reduced from 500 MiB to limit disk waste
                          # when footer is missing/fragmented)

[[signature]]
name      = "GIF Image"
extension = "gif"
header    = "47 49 46 38"
footer    = "00 3B"
max_size  = 10_485_760  # 10 MiB

[[signature]]
name             = "BMP Image"
extension        = "bmp"
# 10-byte header: "BM" + 4-byte file size (wildcarded, read via size_hint) +
# reserved1 (00 00) + reserved2 (00 00).  The two reserved fields are always
# zero in every valid BMP writer; anchoring on them eliminates the massive
# false-positive rate of the original 2-byte "42 4D" match.
header           = "42 4D ?? ?? ?? ?? 00 00 00 00"
footer           = ""
max_size         = 52_428_800  # 50 MiB hard cap
# The u32 at offset 2 is the total file size (no add needed)
size_hint_offset = 2
size_hint_len    = 4
size_hint_endian = "le"
size_hint_add    = 0

[[signature]]
name      = "MP3 Audio"
extension = "mp3"
# ID3v2 tag header: "ID3" (3 bytes) + major version (wildcarded: 02/03/04) +
# revision byte (ALWAYS 0x00 in all ID3v2 versions) — anchoring on the
# revision byte extends effective discrimination from 3 to 5 bytes and
# eliminates the bulk of false positives from random binary data.
# Note: some AAC/M4A files also carry ID3v2 tags; those will be extracted
# with a .mp3 extension but are still valid ID3-tagged audio.
header    = "49 44 33 ?? 00"
footer    = ""
min_size  = 4096           # reject sub-4 KiB noise hits
max_size  = 52_428_800     # 50 MiB hard cap (no footer to terminate cleanly)

[[signature]]
name      = "MP4 Video"
extension = "mp4"
# Wildcards the 4-byte ftyp box size (varies: 24/28/32/36 bytes depending on
# brand list length) and anchors on "ftyp" which is unique to ISO base media
# files.  Catches MP4, MOV, M4A, M4V, and 3GP in a single signature.
header    = "?? ?? ?? ?? 66 74 79 70"
footer    = ""
min_size  = 4096
max_size  = 4_294_967_296  # 4 GiB

[[signature]]
name      = "RAR Archive"
extension = "rar"
header    = "52 61 72 21 1A 07"
footer    = ""
max_size  = 524_288_000  # 500 MiB

[[signature]]
name           = "7-Zip Archive"
extension      = "7z"
header         = "37 7A BC AF 27 1C"
footer         = ""
max_size       = 524_288_000  # 500 MiB hard cap
# total = 32 + NextHeaderOffset (u64 LE @12) + NextHeaderSize (u64 LE @20)
size_hint_kind = "seven_zip"

[[signature]]
name           = "SQLite Database"
extension      = "db"
header         = "53 51 4C 69 74 65 20 66 6F 72 6D 61 74 20 33 00"
footer         = ""
max_size       = 10_737_418_240  # 10 GiB hard cap
# page_size (u16 BE @16, value 1 → 65536) × db_pages (u32 BE @28) = exact file size
size_hint_kind = "sqlite"

[[signature]]
name             = "WAV Audio (RIFF)"
extension        = "wav"
# RIFF + 4-byte size (wildcard) + "WAVE" subtype discriminator
header           = "52 49 46 46 ?? ?? ?? ?? 57 41 56 45"
footer           = ""
max_size         = 2_147_483_648  # 2 GiB hard cap
# The u32 at offset 4 is the payload size; total file = value + 8
size_hint_offset = 4
size_hint_len    = 4
size_hint_endian = "le"
size_hint_add    = 8

[[signature]]
name             = "AVI Video (RIFF)"
extension        = "avi"
# RIFF + 4-byte size (wildcard) + "AVI " subtype discriminator
header           = "52 49 46 46 ?? ?? ?? ?? 41 56 49 20"
footer           = ""
max_size         = 2_147_483_648  # 2 GiB hard cap
# The u32 at offset 4 is the payload size; total file = value + 8
size_hint_offset = 4
size_hint_len    = 4
size_hint_endian = "le"
size_hint_add    = 8

[[signature]]
name      = "Matroska / MKV Video"
extension = "mkv"
header    = "1A 45 DF A3"
footer    = ""
max_size  = 8_589_934_592  # 8 GiB (reduced from 40 GiB; covers typical 1080p
                            # films while limiting disk waste on false positives)

[[signature]]
name      = "FLAC Audio"
extension = "flac"
header    = "66 4C 61 43"
footer    = ""
max_size  = 2_147_483_648  # 2 GiB

[[signature]]
name      = "Windows PE Executable"
extension = "exe"
# Extended from 2 bytes ("MZ") to 4 bytes by anchoring on the standard MSVC
# linker DOS stub: 4D 5A 90 00.  Byte 2 = 0x90 (144 = bytes on last page of
# stub) and byte 3 = 0x00 are written by every modern PE/COFF linker.  This
# eliminates the near-identical false-positive problem that "MZ" alone had.
header    = "4D 5A 90 00"
footer    = ""
min_size  = 4096
max_size  = 104_857_600  # 100 MiB (reduced from 500 MiB; covers virtually all
                          # EXE/DLL/SYS files; limits disk waste on false positives)

[[signature]]
name      = "VMDK Disk Image"
extension = "vmdk"
header    = "4B 44 4D 56"
footer    = ""
min_size  = 65536
max_size  = 10_737_418_240  # 10 GiB (reduced from 100 GiB; niche use case,
                             # limits catastrophic disk waste on false positives)

[[signature]]
name           = "OGG Media"
extension      = "ogg"
header         = "4F 67 67 53"
footer         = ""
max_size       = 2_147_483_648  # 2 GiB hard cap (fallback if EOS page not found)
# Walk Ogg page headers to find the end-of-stream (EOS) page and compute the
# exact file size, avoiding the previous behaviour of always extracting max_size.
size_hint_kind = "ogg_stream"

[[signature]]
name              = "Windows Event Log"
extension         = "evtx"
header            = "45 4C 46 49 4C 45 00"
footer            = ""
max_size          = 104_857_600   # 100 MiB hard cap
# chunk_count (u16 LE @42) × 65536 + 4096 (file header) = exact file size
size_hint_kind    = "linear_scaled"
size_hint_offset  = 42
size_hint_len     = 2
size_hint_endian  = "le"
size_hint_scale   = 65536
size_hint_add     = 4096

[[signature]]
name      = "Outlook PST/OST"
extension = "pst"
header    = "21 42 44 4E"
footer    = ""
min_size  = 65536      # 64 KiB minimum — a real PST file has at least a full
                        # header block; rejects false positives from triggering
                        # a 20 GiB extraction attempt
max_size  = 21_474_836_480  # 20 GiB

[[signature]]
name      = "XML Document"
extension = "xml"
header    = "3C 3F 78 6D 6C"
footer    = ""
# XML fragments appear embedded inside DOCX/XLSX internals, Android APKs,
# config files, etc. — standalone XML worth recovering is almost always small.
min_size  = 256
max_size  = 5_242_880   # 5 MiB (reduced from 50 MiB)

[[signature]]
name      = "HTML Document"
extension = "html"
header    = "3C 21 44 4F 43 54 59 50 45"
footer    = "3C 2F 68 74 6D 6C 3E"
max_size  = 10_485_760  # 10 MiB

[[signature]]
name      = "RTF Document"
extension = "rtf"
header    = "7B 5C 72 74 66 31"
footer    = ""
max_size  = 52_428_800  # 50 MiB

[[signature]]
name      = "vCard Contact"
extension = "vcf"
header    = "42 45 47 49 4E 3A 56 43 41 52 44"
footer    = "45 4E 44 3A 56 43 41 52 44"
max_size  = 1_048_576  # 1 MiB

[[signature]]
name      = "iCalendar"
extension = "ics"
header    = "42 45 47 49 4E 3A 56 43 41 4C 45 4E 44 41 52"
footer    = "45 4E 44 3A 56 43 41 4C 45 4E 44 41 52"
max_size  = 10_485_760  # 10 MiB

[[signature]]
name           = "OLE2 Compound (DOC/XLS/PPT)"
extension      = "ole"
header         = "D0 CF 11 E0 A1 B1 1A E1"
footer         = ""
max_size       = 2_147_483_648  # 2 GiB hard cap (raised from 500 MiB to recover large PST/MDB files)
# Reads uSectorShift (offset 30) and csectFat (offset 44) to compute the
# actual file size: (csectFat × (sector_size/4) + 1) × sector_size
size_hint_kind = "ole2"
